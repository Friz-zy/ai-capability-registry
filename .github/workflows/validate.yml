name: Validate Registry

permissions:
  contents: write

on:
  pull_request:
    paths:
      - '.github/workflows/validate.yml'
      - 'registry/**'
      - 'skill-catalog.d/**'
      - 'skill-catalog.md'
      - 'skills/**'
      - 'scripts/**'
      - 'external/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/validate.yml'
      - 'registry/**'
      - 'skill-catalog.d/**'
      - 'skill-catalog.md'
      - 'skills/**'
      - 'scripts/**'
      - 'external/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate registry
        run: ./scripts/validate-registry.py

  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Sync external submodules
        run: ./scripts/update-external.py
      - name: Generate skill catalog chunks and skills tree
        run: ./scripts/discover-skills.py
      - name: Check for generated changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Fail pull request when generated files are out of sync
        if: github.event_name == 'pull_request' && steps.changes.outputs.changed == 'true'
        run: |
          echo "Generated catalog chunks/files are out of sync. Run ./scripts/discover-skills.py and commit the result."
          git diff
          exit 1
      - name: Commit and push generated changes
        if: github.event_name == 'push' && steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "ci: sync skill catalog chunks and skills tree"
          git push

  bootstrap-check:
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify bootstrap produces clean state
        run: |
          ./scripts/update-external.py
          ./scripts/discover-skills.py
          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: Bootstrap produces non-deterministic output"
            git status --short
            git diff
            exit 1
          fi
