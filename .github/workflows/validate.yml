name: Validate Registry

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate registry
        run: ./scripts/validate-registry.py

  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Sync external submodules
        run: ./scripts/update-external.py
      - name: Generate skill maps
        run: ./scripts/discover-skills.py
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && git diff --cached --quiet || true
          if git diff --exit-code; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "diff=$(git diff)" >> $GITHUB_OUTPUT
          fi
      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "ci: sync external submodules and regenerate skill maps"
          git push

  bootstrap-check:
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify bootstrap produces clean state
        run: |
          ./scripts/update-external.py
          ./scripts/discover-skills.py
          if [ -n "$(git diff)" ]; then
            echo "ERROR: Bootstrap produces non-deterministic output"
            git diff
            exit 1
          fi
