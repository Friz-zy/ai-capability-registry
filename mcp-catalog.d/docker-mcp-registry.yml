source: docker-mcp-registry
mcp_servers:
  - id: airtable-mcp-server
    exists: true
    enabled: false
    name: Airtable
    description: Provides AI assistants with direct access to Airtable bases, allowing them to read schemas, query records, and interact with your Airtable data. Supports listing bases, retrieving table structures, and searching through records to help automate workflows and answer questions about your organized data.
    source:
      type: docker
      provider: docker-mcp-registry
      registry_url: https://github.com/docker/mcp-registry/tree/main/servers/airtable-mcp-server
      image: mcp/airtable-mcp-server
      docker:
        command: docker
        args:
          - run
          - --rm
          - -i
          - -e
          - AIRTABLE_API_KEY
          - mcp/airtable-mcp-server
      repo: https://github.com/domdomegg/airtable-mcp-server
      commit: cc71f597b89ba8bd20aafce094452439126cd3e6
    security:
      local_code_execution: isolated_container_only
      sandboxed: true
      reviewed: true
      data_risk: unknown_until_reviewed
      permission_default: manual_review
    transport:
      type: stdio
    keywords:
      - airtable
      - search
      - access
      - data
      - productivity
    trust: reviewed
    runtime: docker
    default_mode: manual_review
    skill:
      when_to_use:
        - Use Airtable only when the task directly involves the relevant service, SaaS product, platform, or technology.
      instructions:
        - Use the MCP tools only for the user-requested service workflow and prefer read-only operations by default.
        - Confirm the target account, workspace, project, repository, or dataset before actions that can read private data or mutate remote state.
        - This server requires authorization or environment-provided credentials; ask the user before connecting or requesting access.
      references:
        - https://github.com/domdomegg/airtable-mcp-server
        - https://github.com/docker/mcp-registry/tree/main/servers/airtable-mcp-server
      docker:
        - Launch through Docker stdio with `docker run --rm -i -e AIRTABLE_API_KEY mcp/airtable-mcp-server`.
        - 'Confirm required environment variables before launch: AIRTABLE_API_KEY.'
