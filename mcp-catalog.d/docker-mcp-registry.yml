      provider: docker-mcp-registry
      registry_url: https://github.com/docker/mcp-registry/tree/main/servers/aks
      image: mcp/aks
      docker:
        command: docker
        args:
          - run
          - --rm
          - -i
          - mcp/aks
          - --transport=stdio
          - --access-level={{aks.access_level}}
          - --allow-namespaces={{aks.allow_namespaces}}
          - --additional-tools={{aks.additional_tools}}
      repo: https://github.com/Azure/aks-mcp
      commit: e60444c3d739dc3606d9ff4cd3826019e02df8d9
    security:
      local_code_execution: isolated_container_only
