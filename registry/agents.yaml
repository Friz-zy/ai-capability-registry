agents:
  - id: claude-code
    name: Claude Code
    description: Anthropic coding agent with skill/plugin support.
    config_paths:
      global: ~/.claude
      project: .claude
    install_script: generated/install-scripts/claude-code.sh
    install_plan: generated/install-plans/manifests/claude-code
    supports:
      - skills
      - plugins
      - mcp
      - project_instructions
    install_strategy: repo_local_active_cache

  - id: kilo-code
    name: Kilo Code
    description: Agent CLI/editor workflow that can load skills through skills.paths and remote MCP config.
    config_paths:
      global: ~/.config/kilo
      project: .kilo
    install_script: generated/install-scripts/kilo-code.sh
    install_plan: generated/install-plans/manifests/kilo-code
    supports:
      - skills
      - mcp
      - project_instructions
      - custom_agents
    install_strategy: repo_local_active_cache

  - id: codex-cli
    name: Codex CLI
    description: OpenAI coding agent workflow using skills and bootstrap references.
    config_paths:
      global: ~/.codex
      project: .codex
    install_script: generated/install-scripts/codex-cli.sh
    install_plan: generated/install-plans/manifests/codex-cli
    supports:
      - skills
      - mcp
      - bootstrap_prompt
    install_strategy: repo_local_active_cache

  - id: cursor
    name: Cursor
    description: IDE agent workflow using rules, docs, plugins, and external tool configuration.
    config_paths:
      global: ~/.cursor
      project: .cursor
    install_script: generated/install-scripts/cursor.sh
    install_plan: generated/install-plans/manifests/cursor
    supports:
      - project_rules
      - plugins
      - mcp
      - docs
    install_strategy: repo_local_active_cache

  - id: aider
    name: Aider
    description: CLI pair-programming agent that can consume repository instructions and generated context.
    config_paths:
      global: ~/.aider.conf.yml
      project: .aider.conf.yml
    install_script: generated/install-scripts/aider.sh
    install_plan: generated/install-plans/manifests/aider
    supports:
      - repo_context
      - bootstrap_prompt
    install_strategy: repo_local_active_cache

  - id: opencode
    name: OpenCode
    description: Terminal coding agent using local config, plugins, and skill paths.
    config_paths:
      global: ~/.config/opencode
      project: opencode.json
    install_script: generated/install-scripts/opencode.sh
    install_plan: generated/install-plans/manifests/opencode
    supports:
      - skills
      - plugins
      - project_instructions
      - mcp
    install_strategy: repo_local_active_cache

  - id: amazon-kiro
    name: Amazon Kiro
    description: Spec-driven development agent integration target.
    config_paths:
      global: ~/.kiro
      project: .kiro
    install_script: generated/install-scripts/amazon-kiro.sh
    install_plan: generated/install-plans/manifests/amazon-kiro
    supports:
      - specs
      - steering
      - mcp
    install_strategy: repo_local_active_cache
