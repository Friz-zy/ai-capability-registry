agents:
  - id: claude-code
    name: Claude Code
    description: Anthropic coding agent with skill/plugin support.
    config_paths:
      global: ~/.claude
      project: .claude
    adapter: adapters/claude-code
    generated_config: generated/agent-configs/claude-code.md
    supports:
      - skills
      - mcp
      - project_instructions
    install_strategy: symlink_generated_skills

  - id: kilo-code
    name: Kilo Code
    description: Agent CLI/editor workflow that can load project commands, agents, skills, and registry references.
    config_paths:
      global: ~/.config/kilo
      project: .kilo
    adapter: adapters/kilo-code
    generated_config: generated/agent-configs/kilo-code.json
    supports:
      - skills
      - mcp
      - project_instructions
      - custom_agents
    install_strategy: reference_generated_registry

  - id: codex-cli
    name: Codex CLI
    description: OpenAI coding agent workflow using prompt/bootstrap and skill references.
    config_paths:
      global: ~/.codex
      project: .codex
    adapter: adapters/codex-cli
    generated_config: generated/agent-configs/codex-cli.md
    supports:
      - skills
      - mcp
      - bootstrap_prompt
    install_strategy: bootstrap_prompt

  - id: cursor
    name: Cursor
    description: IDE agent workflow using rules, docs, and external tool configuration.
    config_paths:
      global: ~/.cursor
      project: .cursor
    adapter: adapters/cursor
    generated_config: generated/agent-configs/cursor.md
    supports:
      - project_rules
      - mcp
      - docs
    install_strategy: reference_generated_docs

  - id: aider
    name: Aider
    description: CLI pair-programming agent that can consume repository instructions and generated context.
    config_paths:
      global: ~/.aider.conf.yml
      project: .aider.conf.yml
    adapter: adapters/aider
    generated_config: generated/agent-configs/aider.md
    supports:
      - repo_context
      - bootstrap_prompt
    install_strategy: bootstrap_prompt

  - id: opencode
    name: OpenCode
    description: Terminal coding agent using local config and project instructions.
    config_paths:
      global: ~/.config/opencode
      project: opencode.json
    adapter: adapters/opencode
    generated_config: generated/agent-configs/opencode.md
    supports:
      - project_instructions
      - mcp
    install_strategy: reference_generated_docs

  - id: amazon-kiro
    name: Amazon Kiro
    description: Spec-driven development agent integration target.
    config_paths:
      global: ~/.kiro
      project: .kiro
    adapter: adapters/amazon-kiro
    generated_config: generated/agent-configs/amazon-kiro.md
    supports:
      - specs
      - steering
      - mcp
    install_strategy: reference_generated_docs
