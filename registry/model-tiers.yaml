# Model tier presets for AI providers connectable to CLI coding agents.
# Tiers: junior (fast/cheap), middle (balanced), senior (high capability), lead (maximum capability).
# Ranking based on public benchmarks, OpenRouter pricing, and capability data as of 2026-06.
# Benchmark: Artificial Analysis Coding Index (https://artificialanalysis.ai).
# Score 0-100, higher is better. Composite coding capability metric. null = not yet evaluated.

schema_version: "1.3"

tier_definitions:
  junior:
    description: Fastest and cheapest. Good for high-volume, low-complexity tasks.
    characteristics: [fast_response, low_cost, reduced_reasoning_depth]
    typical_use_cases: [classification, simple_edits, formatting, boilerplate_generation, summarization]
  middle:
    description: Best balance of speed, cost, and intelligence. Default for most tasks.
    characteristics: [balanced_speed_and_intelligence, cost_effective, solid_reasoning]
    typical_use_cases: [feature_implementation, debugging, refactoring, code_review, documentation]
  senior:
    description: High capability for complex reasoning and large-context tasks.
    characteristics: [strong_reasoning, large_context_window, extended_thinking, nuanced_understanding]
    typical_use_cases: [architecture_decisions, complex_bug_analysis, multi_file_refactoring, security_review]
  lead:
    description: Maximum capability. For mission-critical, highest-difficulty tasks.
    characteristics: [frontier_reasoning, maximum_context, best_instruction_following, deepest_analysis]
    typical_use_cases: [system_design, critical_security_audit, novel_algorithm_design, complex_migration_planning]

