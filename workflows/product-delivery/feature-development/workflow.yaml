id: feature-development
name: Feature Development Workflow
description: Workflow for adding or changing functionality in an existing product.
entry_conditions:
  - User wants to add, change, or improve functionality in an existing product.
  - Existing product, users, codebase, business rules, or delivery constraints already exist.
clarification_questions:
  - What product or system is this feature for?
  - What user problem should this feature solve?
  - Who is the target user?
  - What should be explicitly out of scope?
  - Are there existing designs, APIs, codebase constraints, analytics, or business rules?
  - What output should this run produce: feature spec, technical plan, tasks, implementation, review, or full workflow result?
delegation_mode:
  type: staged_parallel
  rules:
    - Run roles inside the same stage in parallel when their inputs are ready.
    - Do not start the next stage until the current stage gate passes.
    - Request revisions from roles when acceptance criteria are not met.
conflict_resolution:
  business_scope: product-manager
  requirements_detail: business-analyst
  user_experience: ux-ui-designer
  visual_design: ux-ui-designer
  architecture: solution-architect
  implementation: tech-lead
  infrastructure: devops-platform-engineer
  testing: qa-engineer
  release: release-manager
stages:
  - id: discovery
    name: Discovery & Requirements
    coordinator_goal: Understand business value, target users, constraints, existing behavior, and success metrics.
    roles:
      - product-manager
      - business-analyst
      - tech-lead
    inputs:
      - user_request
      - existing_context
    outputs:
      - feature_spec
      - user_stories
      - success_metrics
      - out_of_scope
      - existing_constraints
    acceptance_criteria:
      - Business goal is clear.
      - Target users are defined.
      - Main user stories are written.
      - Out-of-scope items and existing constraints are listed.
    gate:
      type: approval_required
      by: coordinator
  - id: ux_ui_design
    name: UX/UI Design
    coordinator_goal: Fit the feature into existing user flows, product patterns, and UI states.
    roles:
      - ux-ui-designer
    inputs:
      - feature_spec
      - user_stories
      - existing_design_system
    outputs:
      - user_flows
      - wireframe_description
      - ui_states
      - edge_cases
      - design_system_fit
    acceptance_criteria:
      - Main user flow is described.
      - Empty, loading, error, success, and permission states are covered.
      - Design fits existing product patterns.
      - Edge cases are explicit.
    gate:
      type: quality_check
      by: coordinator
  - id: architecture_planning
    name: Architecture & Planning
    coordinator_goal: Decide how the feature fits existing architecture without creating avoidable regression risk.
    roles:
      - solution-architect
      - tech-lead
      - devops-platform-engineer
    inputs:
      - feature_spec
      - user_flows
      - known_technical_constraints
    outputs:
      - architecture_plan
      - api_changes
      - database_changes
      - infrastructure_changes
      - backward_compatibility_notes
      - implementation_risks
    acceptance_criteria:
      - Technical approach is clear.
      - Risks and migrations are identified.
      - API and data model changes are described.
      - Backward compatibility and regression risk are considered.
    gate:
      type: architecture_review
      by: coordinator
  - id: development_planning
    name: Development Planning
    coordinator_goal: Convert the approved feature and architecture plan into small, reviewable implementation tasks.
    roles:
      - frontend-engineer
      - backend-engineer
      - devops-platform-engineer
      - tech-lead
    inputs:
      - architecture_plan
      - feature_spec
      - design_system_fit
    outputs:
      - task_breakdown
      - implementation_order
      - dependencies
      - pull_request_plan
      - shared_code_risks
    acceptance_criteria:
      - Tasks are small enough to implement and review.
      - Dependencies are explicit.
      - Frontend, backend, and infrastructure work are separated.
      - Shared-code and migration risks are listed.
    gate:
      type: quality_check
      by: coordinator
  - id: qa_testing
    name: QA & Testing
    coordinator_goal: Define coverage for the new feature and regression scope for affected existing behavior.
    roles:
      - qa-engineer
    inputs:
      - feature_spec
      - task_breakdown
      - architecture_plan
    outputs:
      - test_plan
      - regression_scope
      - automation_plan
      - qa_risks
    acceptance_criteria:
      - Positive and negative cases are covered.
      - Regression scope is defined.
      - Automation candidates are listed.
      - Test cases can be traced to requirements.
    gate:
      type: quality_check
      by: coordinator
  - id: release_deployment
    name: Release & Deployment
    coordinator_goal: Plan a safe rollout using feature flags, staged exposure, monitoring, and rollback guidance.
    roles:
      - release-manager
      - devops-platform-engineer
      - product-manager
      - customer-success-support
    inputs:
      - implementation_plan
      - test_plan
      - qa_risks
    outputs:
      - release_plan
      - rollout_strategy
      - rollback_plan
      - release_notes
      - support_notes
    acceptance_criteria:
      - Rollout strategy is safe.
      - Rollback path is clear.
      - Feature flags or staged rollout are considered.
      - Support and release communications are included.
    gate:
      type: final_review
      by: coordinator
  - id: support_iteration
    name: Support, Analytics & Iteration
    coordinator_goal: Monitor feature impact and convert support, analytics, and user feedback into follow-up work.
    roles:
      - product-manager
      - business-analyst
      - customer-success-support
    inputs:
      - release_plan
      - success_metrics
    outputs:
      - analytics_plan
      - feedback_summary_plan
      - follow_up_backlog
      - iteration_risks
    acceptance_criteria:
      - Feature success metrics are measurable.
      - Support and analytics signals are assigned owners.
      - Follow-up work is separated from original scope.
    gate:
      type: quality_check
      by: coordinator
